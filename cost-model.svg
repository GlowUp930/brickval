<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      body { font-family: system-ui, sans-serif; }
      .bg { fill: #0f0f0f; }
      .grid-line { stroke: #2a2a2a; stroke-width: 1; }
      .axis-line { stroke: #444; stroke-width: 2; }
      .text-title { font-size: 16px; font-weight: 600; fill: #ddd; }
      .text-label { font-size: 11px; fill: #888; }
      .text-tick { font-size: 10px; fill: #666; }
      .line-revenue { stroke: #4ade80; stroke-width: 3; fill: none; }
      .line-cost { stroke: #f87171; stroke-width: 3; fill: none; }
      .line-margin { stroke: #a78bfa; stroke-width: 3; fill: none; }
      .dot-revenue { fill: #4ade80; }
      .dot-cost { fill: #f87171; }
      .dot-margin { fill: #a78bfa; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="900"/>

  <!-- Title -->
  <text x="700" y="30" text-anchor="middle" class="text-title" font-size="20">BrickVal Unit Economics (Claude Haiku)</text>

  <!-- ===== CHART 1: Cost vs Revenue (top-left) ===== -->
  <g id="chart1">
    <!-- Background -->
    <rect x="50" y="60" width="620" height="360" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Grid lines (horizontal) -->
    <line x1="50" x2="670" y1="380" y2="380" class="grid-line"/>
    <line x1="50" x2="670" y1="320" y2="320" class="grid-line"/>
    <line x1="50" x2="670" y1="260" y2="260" class="grid-line"/>
    <line x1="50" x2="670" y1="200" y2="200" class="grid-line"/>
    <line x1="50" x2="670" y1="140" y2="140" class="grid-line"/>
    <line x1="50" x2="670" y1="80" y2="80" class="grid-line"/>

    <!-- Grid lines (vertical) -->
    <line x1="90" x2="90" y1="60" y2="420" class="grid-line"/>
    <line x1="180" x2="180" y1="60" y2="420" class="grid-line"/>
    <line x1="270" x2="270" y1="60" y2="420" class="grid-line"/>
    <line x1="360" x2="360" y1="60" y2="420" class="grid-line"/>
    <line x1="450" x2="450" y1="60" y2="420" class="grid-line"/>
    <line x1="540" x2="540" y1="60" y2="420" class="grid-line"/>
    <line x1="630" x2="630" y1="60" y2="420" class="grid-line"/>

    <!-- Axes -->
    <line x1="50" y1="420" x2="670" y2="420" class="axis-line"/>
    <line x1="50" y1="60" x2="50" y2="420" class="axis-line"/>

    <!-- Y-axis labels -->
    <text x="35" y="425" text-anchor="end" class="text-tick">$0</text>
    <text x="35" y="365" text-anchor="end" class="text-tick">$2k</text>
    <text x="35" y="305" text-anchor="end" class="text-tick">$4k</text>
    <text x="35" y="245" text-anchor="end" class="text-tick">$6k</text>
    <text x="35" y="185" text-anchor="end" class="text-tick">$8k</text>
    <text x="35" y="125" text-anchor="end" class="text-tick">$10k</text>

    <!-- X-axis labels -->
    <text x="50" y="445" text-anchor="middle" class="text-tick">0</text>
    <text x="180" y="445" text-anchor="middle" class="text-tick">100</text>
    <text x="310" y="445" text-anchor="middle" class="text-tick">250</text>
    <text x="440" y="445" text-anchor="middle" class="text-tick">500</text>
    <text x="570" y="445" text-anchor="middle" class="text-tick">750</text>
    <text x="670" y="445" text-anchor="middle" class="text-tick">1k</text>

    <!-- Revenue line: y = 9.99*x, scaled -->
    <polyline points="50,420 90,396 180,340 270,284 360,228 450,172 540,116 630,60 670,40" class="line-revenue"/>
    <circle cx="50" cy="420" r="4" class="dot-revenue"/>
    <circle cx="90" cy="396" r="4" class="dot-revenue"/>
    <circle cx="180" cy="340" r="4" class="dot-revenue"/>
    <circle cx="270" cy="284" r="4" class="dot-revenue"/>
    <circle cx="360" cy="228" r="4" class="dot-revenue"/>
    <circle cx="450" cy="172" r="4" class="dot-revenue"/>
    <circle cx="540" cy="116" r="4" class="dot-revenue"/>

    <!-- Cost line: y = 50 + 0.67*x, scaled -->
    <polyline points="50,410 90,397 180,374 270,352 360,329 450,306 540,283 630,260 670,249" class="line-cost"/>
    <circle cx="50" cy="410" r="4" class="dot-cost"/>
    <circle cx="90" cy="397" r="4" class="dot-cost"/>
    <circle cx="180" cy="374" r="4" class="dot-cost"/>
    <circle cx="270" cy="352" r="4" class="dot-cost"/>
    <circle cx="360" cy="329" r="4" class="dot-cost"/>
    <circle cx="450" cy="306" r="4" class="dot-cost"/>
    <circle cx="540" cy="283" r="4" class="dot-cost"/>

    <!-- Break-even marker -->
    <line x1="57" x2="57" y1="60" y2="420" stroke="#666" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
    <text x="57" y="50" text-anchor="middle" class="text-label" fill="#666" font-size="9">Break-even ~6</text>

    <!-- Labels -->
    <text x="360" y="75" text-anchor="middle" class="text-title" font-size="14">Cost vs Revenue</text>
    <text x="630" y="95" fill="#4ade80" font-size="11">● Revenue</text>
    <text x="630" y="110" fill="#f87171" font-size="11">● Cost</text>
    <text x="35" y="50" text-anchor="end" class="text-label">$/month</text>
    <text x="360" y="475" text-anchor="middle" class="text-label">Paying Users →</text>
  </g>

  <!-- ===== CHART 2: Profit (top-right) ===== -->
  <g id="chart2">
    <rect x="730" y="60" width="620" height="360" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Grid -->
    <line x1="730" x2="1350" y1="380" y2="380" class="grid-line"/>
    <line x1="730" x2="1350" y1="320" y2="320" class="grid-line"/>
    <line x1="730" x2="1350" y1="260" y2="260" class="grid-line"/>
    <line x1="730" x2="1350" y1="200" y2="200" class="grid-line"/>
    <line x1="730" x2="1350" y1="140" y2="140" class="grid-line"/>
    <line x1="730" x2="1350" y1="80" y2="80" class="grid-line"/>

    <!-- Axes -->
    <line x1="730" y1="420" x2="1350" y2="420" class="axis-line"/>
    <line x1="730" y1="60" x2="730" y2="420" class="axis-line"/>
    <line x1="730" x2="1350" y1="410" y2="410" stroke="#666" stroke-width="1"/>

    <!-- Y-axis labels -->
    <text x="715" y="425" text-anchor="end" class="text-tick">$0</text>
    <text x="715" y="365" text-anchor="end" class="text-tick">$3k</text>
    <text x="715" y="305" text-anchor="end" class="text-tick">$6k</text>
    <text x="715" y="245" text-anchor="end" class="text-tick">$9k</text>

    <!-- X-axis labels -->
    <text x="730" y="445" text-anchor="middle" class="text-tick">0</text>
    <text x="860" y="445" text-anchor="middle" class="text-tick">100</text>
    <text x="990" y="445" text-anchor="middle" class="text-tick">250</text>
    <text x="1120" y="445" text-anchor="middle" class="text-tick">500</text>
    <text x="1250" y="445" text-anchor="middle" class="text-tick">750</text>
    <text x="1350" y="445" text-anchor="middle" class="text-tick">1k</text>

    <!-- Bars (profit at different user counts) -->
    <rect x="745" y="410" width="20" height="0" fill="#f87171" opacity="0.7"/>
    <rect x="825" y="383" width="20" height="27" fill="#4ade80" opacity="0.7"/>
    <rect x="905" y="346" width="20" height="64" fill="#4ade80" opacity="0.7"/>
    <rect x="985" y="309" width="20" height="101" fill="#4ade80" opacity="0.7"/>
    <rect x="1065" y="272" width="20" height="138" fill="#4ade80" opacity="0.7"/>
    <rect x="1145" y="200" width="20" height="210" fill="#4ade80" opacity="0.7"/>
    <rect x="1225" y="112" width="20" height="298" fill="#4ade80" opacity="0.7"/>

    <text x="1040" y="75" text-anchor="middle" class="text-title" font-size="14">Monthly Profit</text>
    <text x="715" y="50" text-anchor="end" class="text-label">$/month</text>
    <text x="1040" y="475" text-anchor="middle" class="text-label">Paying Users →</text>
  </g>

  <!-- ===== CHART 3: Margin % (bottom-left) ===== -->
  <g id="chart3">
    <rect x="50" y="500" width="620" height="360" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Grid -->
    <line x1="50" x2="670" y1="820" y2="820" class="grid-line"/>
    <line x1="50" x2="670" y1="760" y2="760" class="grid-line"/>
    <line x1="50" x2="670" y1="700" y2="700" class="grid-line"/>
    <line x1="50" x2="670" y1="640" y2="640" class="grid-line"/>
    <line x1="50" x2="670" y1="580" y2="580" class="grid-line"/>
    <line x1="50" x2="670" y1="520" y2="520" class="grid-line"/>

    <!-- Axes -->
    <line x1="50" y1="860" x2="670" y2="860" class="axis-line"/>
    <line x1="50" y1="500" x2="50" y2="860" class="axis-line"/>
    <line x1="50" x2="670" y1="532" y2="532" stroke="#666" stroke-width="1" opacity="0.5"/>

    <!-- Y-axis labels -->
    <text x="35" y="865" text-anchor="end" class="text-tick">0%</text>
    <text x="35" y="805" text-anchor="end" class="text-tick">25%</text>
    <text x="35" y="745" text-anchor="end" class="text-tick">50%</text>
    <text x="35" y="685" text-anchor="end" class="text-tick">75%</text>
    <text x="35" y="625" text-anchor="end" class="text-tick">93%</text>

    <!-- X-axis labels -->
    <text x="50" y="885" text-anchor="middle" class="text-tick">0</text>
    <text x="180" y="885" text-anchor="middle" class="text-tick">100</text>
    <text x="310" y="885" text-anchor="middle" class="text-tick">250</text>
    <text x="440" y="885" text-anchor="middle" class="text-tick">500</text>
    <text x="570" y="885" text-anchor="middle" class="text-tick">750</text>
    <text x="670" y="885" text-anchor="middle" class="text-tick">1k</text>

    <!-- Margin line -->
    <polyline points="90,800 180,721 270,662 360,610 450,570 540,542 630,520 670,510" class="line-margin"/>
    <circle cx="90" cy="800" r="4" class="dot-margin"/>
    <circle cx="180" cy="721" r="4" class="dot-margin"/>
    <circle cx="270" cy="662" r="4" class="dot-margin"/>
    <circle cx="360" cy="610" r="4" class="dot-margin"/>
    <circle cx="450" cy="570" r="4" class="dot-margin"/>
    <circle cx="540" cy="542" r="4" class="dot-margin"/>
    <circle cx="630" cy="520" r="4" class="dot-margin"/>

    <!-- Target line -->
    <line x1="50" x2="670" y1="532" y2="532" stroke="#666" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
    <text x="680" y="537" class="text-label" fill="#666" font-size="9">93% target</text>

    <text x="360" y="515" text-anchor="middle" class="text-title" font-size="14">Gross Margin %</text>
    <text x="35" y="490" text-anchor="end" class="text-label">Margin %</text>
    <text x="360" y="905" text-anchor="middle" class="text-label">Paying Users →</text>
  </g>

  <!-- ===== CHART 4: Cost Breakdown (bottom-right) ===== -->
  <g id="chart4">
    <rect x="730" y="500" width="620" height="360" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>

    <!-- Grid -->
    <line x1="730" x2="1350" y1="820" y2="820" class="grid-line"/>
    <line x1="730" x2="1350" y1="760" y2="760" class="grid-line"/>
    <line x1="730" x2="1350" y1="700" y2="700" class="grid-line"/>
    <line x1="730" x2="1350" y1="640" y2="640" class="grid-line"/>
    <line x1="730" x2="1350" y1="580" y2="580" class="grid-line"/>
    <line x1="730" x2="1350" y1="520" y2="520" class="grid-line"/>

    <!-- Axes -->
    <line x1="730" y1="860" x2="1350" y2="860" class="axis-line"/>
    <line x1="730" y1="500" x2="730" y2="860" class="axis-line"/>

    <!-- Y-axis labels -->
    <text x="715" y="865" text-anchor="end" class="text-tick">$0</text>
    <text x="715" y="805" text-anchor="end" class="text-tick">$50</text>
    <text x="715" y="745" text-anchor="end" class="text-tick">$100</text>
    <text x="715" y="685" text-anchor="end" class="text-tick">$150</text>
    <text x="715" y="625" text-anchor="end" class="text-tick">$200</text>

    <!-- X-axis labels -->
    <text x="780" y="885" text-anchor="middle" class="text-tick">10</text>
    <text x="870" y="885" text-anchor="middle" class="text-tick">25</text>
    <text x="960" y="885" text-anchor="middle" class="text-tick">50</text>
    <text x="1050" y="885" text-anchor="middle" class="text-tick">100</text>
    <text x="1140" y="885" text-anchor="middle" class="text-tick">200</text>
    <text x="1230" y="885" text-anchor="middle" class="text-tick">500</text>

    <!-- Stacked bars: Fixed (blue) + Haiku (orange) + Stripe (red) -->
    <!-- 10 users: 50+0.7+5.9 = 56.6 -->
    <rect x="760" y="819" width="18" height="29" fill="#6366f1" opacity="0.8"/>
    <rect x="760" y="818" width="18" height="1" fill="#fb923c" opacity="0.8"/>
    <rect x="760" y="814" width="18" height="4" fill="#f87171" opacity="0.8"/>

    <!-- 25 users: 50+1.75+14.75 = 66.5 -->
    <rect x="850" y="813" width="18" height="29" fill="#6366f1" opacity="0.8"/>
    <rect x="850" y="812" width="18" height="1" fill="#fb923c" opacity="0.8"/>
    <rect x="850" y="805" width="18" height="7" fill="#f87171" opacity="0.8"/>

    <!-- 50 users: 50+3.5+29.5 = 83 -->
    <rect x="940" y="798" width="18" height="29" fill="#6366f1" opacity="0.8"/>
    <rect x="940" y="797" width="18" height="1" fill="#fb923c" opacity="0.8"/>
    <rect x="940" y="784" width="18" height="13" fill="#f87171" opacity="0.8"/>

    <!-- 100 users: 50+7+59 = 116 -->
    <rect x="1030" y="777" width="18" height="29" fill="#6366f1" opacity="0.8"/>
    <rect x="1030" y="776" width="18" height="1" fill="#fb923c" opacity="0.8"/>
    <rect x="1030" y="754" width="18" height="22" fill="#f87171" opacity="0.8"/>

    <!-- 200 users: 50+14+118 = 182 -->
    <rect x="1120" y="737" width="18" height="29" fill="#6366f1" opacity="0.8"/>
    <rect x="1120" y="736" width="18" height="1" fill="#fb923c" opacity="0.8"/>
    <rect x="1120" y="702" width="18" height="34" fill="#f87171" opacity="0.8"/>

    <!-- 500 users: 50+35+295 = 380 -->
    <rect x="1210" y="664" width="18" height="29" fill="#6366f1" opacity="0.8"/>
    <rect x="1210" y="663" width="18" height="1" fill="#fb923c" opacity="0.8"/>
    <rect x="1210" y="598" width="18" height="65" fill="#f87171" opacity="0.8"/>

    <!-- Legend -->
    <rect x="770" y="510" width="12" height="12" fill="#6366f1" opacity="0.8"/>
    <text x="790" y="519" class="text-label" font-size="10">Fixed ($50)</text>

    <rect x="770" y="530" width="12" height="12" fill="#fb923c" opacity="0.8"/>
    <text x="790" y="539" class="text-label" font-size="10">Haiku</text>

    <rect x="770" y="550" width="12" height="12" fill="#f87171" opacity="0.8"/>
    <text x="790" y="559" class="text-label" font-size="10">Stripe Fees</text>

    <text x="1040" y="515" text-anchor="middle" class="text-title" font-size="14">Cost Breakdown</text>
    <text x="715" y="490" text-anchor="end" class="text-label">$/month</text>
    <text x="1040" y="905" text-anchor="middle" class="text-label">Users →</text>
  </g>
</svg>
